auth {
    fingerprint {
        enabled = true
        ready_message = Scan fingerprint to unlock
        present_message = Scanning...
        retry_delay = 250
    }
}

background {
    color = rgb(272822)
}

input-field {
    size = 300, 50
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.2
    outer_color = rgb(66D9EF)
    inner_color = rgb(272822)
    font_color = rgb(F8F8F2)
    fade_on_empty = true
    placeholder_text = Enter password...
    fail_text = $FAIL
    position = 0, -50
    halign = center
    valign = center
}

label {
    text = $TIME12
    color = rgb(F8F8F2)
    font_size = 64
    position = 0, 100
    halign = center
    valign = center
}

label {
    text = $FPRINTPROMPT
    color = rgb(66D9EF)
    font_size = 14
    position = 0, -120
    halign = center
    valign = center
}
