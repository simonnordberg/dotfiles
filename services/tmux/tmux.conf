# git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm

unbind r
bind r source-file ~/.tmux.conf

# global stuff
set -g prefix C-f
bind C-f send-prefix
set -g mouse on

# act like vim
set -g escape-time 0
setw -g mode-keys vi

# pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# pane splitting
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"

# pane resizing
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"
bind-key -T copy-mode-vi Escape send-keys -X cancel

# monokai colors
set -g status-position top
set -g status-style "bg=#272822,fg=#F8F8F2"
set -g status-left "#[bg=#A6E22E,fg=#272822,bold] #S #[bg=#272822] "
set -g status-right "#[fg=#75715E]%H:%M "
set -g status-left-length 30
set -g window-status-format "#[fg=#75715E] #I:#W "
set -g window-status-current-format "#[fg=#66D9EF,bold] #I:#W "
set -g pane-border-style "fg=#75715E"
set -g pane-active-border-style "fg=#A6E22E"
set -g message-style "bg=#272822,fg=#E6DB74"
set -g mode-style "bg=#49483E,fg=#F8F8F2"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
